<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>QR Code - Taxi Asad</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at top, #2a0000 0%, #0a0a0a 70%);
    padding: 20px;
  }
  .card {
    background: #ffffff;
    border-radius: 28px;
    padding: 32px 28px 28px;
    box-shadow: 0 25px 70px rgba(220,20,20,0.35), 0 0 0 4px #c81818;
    text-align: center;
    max-width: 420px;
    width: 100%;
    position: relative;
  }
  .logo-wrap {
    margin-bottom: 8px;
  }
  .logo-wrap img {
    max-width: 200px;
    width: 100px;
    height: auto;
    display: block;
    margin: 0 auto;
  }
  .scan-text {
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 6px;
    color: #c81818;
    margin: 4px 0 20px;
    position: relative;
  }
  .scan-text::before,
  .scan-text::after {
    content: "";
    display: inline-block;
    width: 30px;
    height: 2px;
    background: #c81818;
    vertical-align: middle;
    margin: 0 10px;
  }
  #qrcode {
    display: inline-block;
    padding: 18px;
    background: white;
    border: 4px solid #1a1a1a;
    border-radius: 18px;
    margin-bottom: 22px;
    position: relative;
  }
  #qrcode::before {
    content: "";
    position: absolute;
    inset: -8px;
    border: 2px solid #c81818;
    border-radius: 22px;
    pointer-events: none;
  }
  #qrcode img, #qrcode canvas { display: block; }
  .url {
    background: #1a1a1a;
    padding: 12px 16px;
    border-radius: 10px;
    color: #fff;
    font-size: 15px;
    word-break: break-all;
    direction: ltr;
    margin-bottom: 18px;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-weight: 600;
    letter-spacing: 1px;
  }
  .url span { color: #ff4d4d; }
  .btn {
    display: inline-block;
    background: linear-gradient(135deg, #c81818 0%, #8b0000 100%);
    color: white;
    padding: 13px 32px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    cursor: pointer;
    text-decoration: none;
    font-weight: 700;
    letter-spacing: 1px;
    transition: all 0.2s;
    box-shadow: 0 6px 18px rgba(200,24,24,0.4);
  }
  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 24px rgba(200,24,24,0.55);
  }
  .hint {
    margin-top: 14px;
    color: #888;
    font-size: 13px;
    font-weight: 500;
  }
</style>
</head>
